<html>

<head>
    <style>

        body {
            background-color: #373749;
            margin: 0;
            padding: 40px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
        }

    </style>
</head>

<body>

    <div class="row">
        <div class="image-container">
            <img id="Moon_Icon" src="img/Original/ori_1.png">
        </div>

        </div>

    MoonIcon.onpointerdown = () => {
        MoonSound.play ()
        MoonIcon.src = "img/Changed/chg_1.png"
        setTimeout (() => {
            MoonIcon.src = "img/Original/ori_1.png"
